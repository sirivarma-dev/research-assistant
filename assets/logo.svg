<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Research Assistant logo">
  <defs>
    <linearGradient id="msGrad" x1="10" y1="14" x2="110" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#4ab1ff"/>
    </linearGradient>
  </defs>

  <!-- outer hexagon network ring -->
  <polygon points="106,60 83,99.8 37,99.8 14,60 37,20.2 83,20.2"
           fill="none" stroke="url(#msGrad)" stroke-width="4" stroke-linejoin="round"/>

  <!-- subtle inner hexagon for depth -->
  <polygon points="83,60 71.5,79.9 48.5,79.9 37,60 48.5,40.1 71.5,40.1"
           fill="url(#msGrad)" opacity="0.12"/>

  <!-- spokes from the central hub to each vertex -->
  <g stroke="url(#msGrad)" stroke-width="1.6" opacity="0.4">
    <line x1="60" y1="60" x2="106" y2="60"/>
    <line x1="60" y1="60" x2="83"  y2="20.2"/>
    <line x1="60" y1="60" x2="37"  y2="20.2"/>
    <line x1="60" y1="60" x2="14"  y2="60"/>
    <line x1="60" y1="60" x2="37"  y2="99.8"/>
    <line x1="60" y1="60" x2="83"  y2="99.8"/>
  </g>

  <!-- nodes at each vertex -->
  <g fill="url(#msGrad)">
    <circle cx="106" cy="60"   r="4.5"/>
    <circle cx="83"  cy="99.8" r="4.5"/>
    <circle cx="37"  cy="99.8" r="4.5"/>
    <circle cx="14"  cy="60"   r="4.5"/>
    <circle cx="37"  cy="20.2" r="4.5"/>
    <circle cx="83"  cy="20.2" r="4.5"/>
  </g>

  <!-- central hub node -->
  <circle cx="60" cy="60" r="12" fill="url(#msGrad)"/>
  <circle cx="60" cy="60" r="5"  fill="#0e1117"/>
</svg>
